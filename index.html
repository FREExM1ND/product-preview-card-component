<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Product preview card component</title>

    <link rel="stylesheet" href="./styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;1,9..144,700&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main class="product-preview-card">
      <img
        class="product-img"
        src="./images/image-product-mobile.jpg"
        alt="Bottle of Gabrielle Essence eau de parfum"
      />
      <section class="product-listing">
        <p class="product-type">PERFUME</p>
        <h1 class="product-name">Gabrielle Essence Eau De Parfum</h1>
        <p class="product-description">
          A floral, solar and voluptuous interpretation composed by Olivier
          Polge, Perfumer-Creator for the House of CHANEL.
        </p>
        <p>
          <span class="sale-price">$149.99</span>
          <del class="original-price">$169.99</del>
        </p>
        <button class="add-to-cart">
          <img src="./images/icon-cart.svg" alt="Shopping cart favicon" />Add to
          Cart
        </button>
      </section>
    </main>
    <footer class="credits">
      Challenge by
      <a
        href="https://www.frontendmentor.io/challenges/product-preview-card-component-GO7UmttRfa"
        >Frontend Mentor</a
      >. Coded by <a href="https://github.com/FREExM1ND">Aaron Robbins</a>.
    </footer>
  </body>
</html>
